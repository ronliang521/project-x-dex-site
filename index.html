<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project X · DEX 日交易量</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <div id="err-banner" class="err-banner" role="alert"></div>

      <header>
        <h1>Project X · DEX 日交易量</h1>
        <p>
          数据来自 DeFiLlama
          <code>summary/dexs/project-x</code>（与
          <a href="https://defillama.com/protocol/project-x" target="_blank" rel="noopener"
            >协议页</a
          >
          DEX Volume 口径一致）。日历日为 <strong>UTC</strong>。
        </p>
        <p>
          快速入口：<a href="./kpi.html">MegaETH Flux KPI 表格</a>（本仓内副本） ·
          <a href="https://github.com/ronliang521/megaeth-flux-kpi-site" target="_blank" rel="noopener"
            >KPI 独立仓库</a
          >
        </p>
      </header>

      <section class="stats" aria-label="汇总">
        <div class="stat">
          <div class="label">最近一日</div>
          <div class="value" id="stat-last">—</div>
        </div>
        <div class="stat">
          <div class="label">近 7 日合计</div>
          <div class="value" id="stat-7d">—</div>
        </div>
        <div class="stat">
          <div class="label">近 30 日合计</div>
          <div class="value" id="stat-30d">—</div>
        </div>
        <div class="stat">
          <div class="label">样本天数</div>
          <div class="value" id="stat-rows">—</div>
        </div>
      </section>

      <div class="controls">
        <div class="segmented" role="group" aria-label="图表区间">
          <button type="button" data-range="7">7 天</button>
          <button type="button" data-range="30">30 天</button>
          <button type="button" data-range="90">90 天</button>
          <button type="button" data-range="all">全部</button>
        </div>
        <div class="search">
          <label class="visually-hidden" for="filter-q">筛选日期</label>
          <input
            id="filter-q"
            type="search"
            placeholder="筛选表格：输入日期片段，如 2026-05"
            autocomplete="off"
          />
        </div>
        <div class="actions">
          <button type="button" class="btn" id="btn-export">导出当前区间 CSV</button>
        </div>
      </div>

      <section class="chart-card" aria-labelledby="chart-title">
        <h2 id="chart-title">成交量走势</h2>
        <div class="chart-wrap">
          <canvas id="vol-chart" aria-label="DEX volume chart"></canvas>
        </div>
      </section>

      <section class="table-card" aria-labelledby="table-title">
        <h2 id="table-title">每日明细 <span id="table-count" style="font-weight: 400"></span></h2>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th data-sort="date">日期 (UTC) <span class="hint"></span></th>
                <th data-sort="volumeUsd">成交量 <span class="hint"></span></th>
                <th data-sort="dodPct">较前日 <span class="hint"></span></th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </section>

      <footer>
        <p>
          数据源：<span id="src-line"></span> · 本地副本：
          <code>data.json</code>（可由根目录 <code>project-x-dex-volume-daily.csv</code> 重新生成）
        </p>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
